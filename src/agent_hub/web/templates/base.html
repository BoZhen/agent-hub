<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Agent Hub{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: { DEFAULT: '#1a1a2e', light: '#222244', lighter: '#2a2a4a' },
            accent: { DEFAULT: '#7c3aed', light: '#a78bfa' },
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
    .status-active { color: #34d399; }
    .status-idle { color: #7dd3fc; }
    .status-stopped { color: #6b7280; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
    .dot-active { background: #34d399; box-shadow: 0 0 6px #34d399; }
    .dot-waiting { background: #fbbf24; box-shadow: 0 0 6px #fbbf24; animation: pulse 2s infinite; }
    .dot-idle { background: #7dd3fc; }
    .dot-stopped { background: #6b7280; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes waiting-glow {
      0%, 100% {
        box-shadow: 0 0 4px rgba(251, 191, 36, 0.35), inset 0 0 3px rgba(251, 191, 36, 0.15);
        border-color: rgba(251, 191, 36, 0.45);
      }
      50% {
        box-shadow: 0 0 16px rgba(251, 191, 36, 0.9), inset 0 0 8px rgba(251, 191, 36, 0.35);
        border-color: rgba(251, 191, 36, 0.9);
      }
    }
    .waiting-glow { animation: waiting-glow 1.3s ease-in-out infinite; }
    .fancy-btn {
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.45),
        inset 0 -1px 0 rgba(0, 0, 0, 0.25),
        0 2px 4px rgba(0, 0, 0, 0.4),
        0 0 12px rgba(244, 114, 182, 0.35);
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.35);
    }
    .fancy-btn:hover {
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.65),
        inset 0 -1px 0 rgba(0, 0, 0, 0.15),
        0 3px 6px rgba(0, 0, 0, 0.45),
        0 0 18px rgba(244, 114, 182, 0.55);
    }
    .fancy-btn:active {
      box-shadow:
        inset 0 2px 3px rgba(0, 0, 0, 0.3),
        0 1px 2px rgba(0, 0, 0, 0.3);
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="bg-surface text-gray-200 {% block body_class %}min-h-screen{% endblock %}">
  {% block nav %}
  <nav class="shrink-0 border-b border-gray-700/50 px-3 sm:px-6 py-3 flex items-center justify-between">
    {% if current_page == "tmux" %}
    <a href="/tmux" class="text-lg font-bold text-accent-light hover:text-white transition">Tmux Hub</a>
    {% else %}
    <a href="/" class="text-lg font-bold text-accent-light hover:text-white transition">Agent Hub</a>
    {% endif %}
    <div class="flex items-center gap-3 sm:gap-4 text-sm text-gray-400">
      {% if current_page == "tmux" %}
      <a href="/" class="fancy-btn text-xs sm:text-sm px-3 py-1 rounded-md bg-gradient-to-b from-pink-400 to-pink-600 text-white font-bold border border-pink-900/60 hover:from-white hover:to-pink-200 hover:text-pink-600 active:translate-y-px transition-all">Agent</a>
      {% else %}
      <a href="/tmux" class="fancy-btn text-xs sm:text-sm px-3 py-1 rounded-md bg-gradient-to-b from-pink-400 to-pink-600 text-white font-bold border border-pink-900/60 hover:from-white hover:to-pink-200 hover:text-pink-600 active:translate-y-px transition-all">Tmux</a>
      {% endif %}
    </div>
  </nav>
  {% endblock %}
  <main class="{% block main_width %}max-w-7xl{% endblock %} mx-auto {% block main_px %}px-3 sm:px-6{% endblock %} {% block main_py %}py-4 sm:py-6{% endblock %} {% block main_extra_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>
  <script>
    // WebSocket connection
    let ws;
    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}/ws`);
      ws.onopen = () => {
        const dot = document.getElementById('ws-dot');
        const label = document.getElementById('ws-label');
        if (dot) dot.className = 'dot dot-active';
        if (label) label.textContent = 'live';
      };
      ws.onclose = () => {
        const dot = document.getElementById('ws-dot');
        const label = document.getElementById('ws-label');
        if (dot) dot.className = 'dot dot-stopped';
        if (label) label.textContent = 'disconnected';
        setTimeout(connectWS, 3000);
      };
      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (typeof onWsMessage === 'function') onWsMessage(data);
      };
    }
    connectWS();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
